name: shizuka-crm

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shizuka}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shizuka}
      POSTGRES_DB: ${POSTGRES_DB:-shizuka_crm}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shizuka} -d ${POSTGRES_DB:-shizuka_crm}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shizuka}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shizuka}
      POSTGRES_DB: ${POSTGRES_DB:-shizuka_crm}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-super-secret-change-me}
      HEAD_ADMIN_EMAIL: ${HEAD_ADMIN_EMAIL:-admin@shizuka.io}
      HEAD_ADMIN_PASSWORD: ${HEAD_ADMIN_PASSWORD:-Admin@12345}
      CORS_ORIGINS: http://localhost:3000
      SEED_DEMO: "true"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pgdata:
